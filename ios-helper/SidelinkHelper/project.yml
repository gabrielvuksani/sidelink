name: SidelinkHelper
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
configs:
  Debug: debug
  Release: release
targets:
  SidelinkHelper:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sidelink.ioshelper
        PRODUCT_NAME: SidelinkHelper
        INFOPLIST_FILE: Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(SIDELINK_TEAM_ID)
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: SideLink
        CFBundleURLTypes:
          - CFBundleURLName: com.sidelink.ioshelper.sources
            CFBundleURLSchemes:
              - sidelink
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSCameraUsageDescription: SideLink uses the camera to scan pairing QR codes from your desktop app.
        NSLocalNetworkUsageDescription: SideLink discovers and connects to your desktop server on your local network.
        BGTaskSchedulerPermittedIdentifiers:
          - com.sidelink.ioshelper.refresh
          - com.sidelink.ioshelper.refresh.processing
        UIBackgroundModes:
          - fetch
          - processing
schemes:
  SidelinkHelper:
    build:
      targets:
        SidelinkHelper: all
    run:
      config: Debug
    archive:
      config: Release
