# ─── Dependabot Configuration ────────────────────────────────────────
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      electron:
        patterns: ['electron', 'electron-*']
      react:
        patterns: ['react', 'react-*', '@types/react*']
      types:
        patterns: ['@types/*']
      vite:
        patterns: ['vite', '@vitejs/*', '@tailwindcss/*']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /python-bundle
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
