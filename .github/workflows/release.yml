# ─── Build & Release ─────────────────────────────────────────────────
# Builds Electron desktop app for macOS, Windows, and Linux.
# Triggered on version tags (v*) for releases, or manually.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to validate/build (for example v0.1.0)'
        type: string
        required: false
      dry_run:
        description: 'Dry run (build but do not publish)'
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.event.inputs.tag || '' }}

jobs:
  verify-version:
    name: Verify Tag Version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Validate tag matches package.json version
        if: env.RELEASE_TAG != ''
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Verify package version format
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if ! echo "$PACKAGE_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "package.json version must be full semver, got: $PACKAGE_VERSION"
            exit 1
          fi

  # ── Build Python bundle for each platform ──────────────────────────
  python-bundle:
    name: Python Bundle (${{ matrix.os }}-${{ matrix.arch }})
    needs: verify-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-14
          - os: darwin
            arch: x64
            runner: macos-15-intel
          - os: win32
            arch: x64
            runner: windows-latest
          - os: linux
            arch: x64
            runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install pyinstaller
          python -m pip install -r python-bundle/requirements.txt

      - name: Build Python bundle
        run: python python-bundle/build.py
        env:
          SIDELINK_PLATFORM: ${{ matrix.os }}
          SIDELINK_ARCH: ${{ matrix.arch }}

      - name: Upload Python bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-bundle-${{ matrix.os }}-${{ matrix.arch }}
          path: python-bundle/dist/${{ matrix.os }}-${{ matrix.arch }}/
          retention-days: 1

  # ── Build desktop app for each platform ────────────────────────────
  build:
    name: Build (${{ matrix.platform }})
    needs: python-bundle
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac-arm64
            python_os: darwin
            python_arch: arm64
            runner: macos-14
            electron_args: '--mac --arm64'
          - platform: mac-x64
            python_os: darwin
            python_arch: x64
            runner: macos-15-intel
            electron_args: '--mac --x64'
          - platform: win
            python_os: win32
            python_arch: x64
            runner: windows-latest
            electron_args: '--win'
          - platform: linux
            python_os: linux
            python_arch: x64
            runner: ubuntu-latest
            electron_args: '--linux'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Install icon generation dependencies
        run: python -m pip install pillow

      - name: Install Electron app deps
        run: npm run desktop:deps

      - name: Validate Electron native dependencies
        run: npm run desktop:preflight

      - name: Build TypeScript + Client
        run: npm run build

      - name: Generate icon assets
        run: python scripts/generate-icon-assets.py

      - name: Download Python bundle for target arch
        uses: actions/download-artifact@v4
        with:
          name: python-bundle-${{ matrix.python_os }}-${{ matrix.python_arch }}
          path: python-bundle/dist/${{ matrix.python_os }}-${{ matrix.python_arch }}/

      # Create placeholder resources dir if helper IPA isn't available
      - name: Ensure resources dirs
        run: |
          mkdir -p resources/helper
        shell: bash

      - name: Build Electron app
        run: npx electron-builder ${{ matrix.electron_args }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test packaged desktop app
        if: startsWith(matrix.platform, 'mac')
        run: node scripts/smoke-packaged-app.cjs

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sidelink-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
          retention-days: 7

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Publish Release
    needs: build
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && github.event.inputs.dry_run != 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag != '')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG != '' && env.RELEASE_TAG || github.ref }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | head -50

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: false
          generate_release_notes: true
          files: |
            helper/SidelinkHelper.ipa
            artifacts/sidelink-mac-x64/*.dmg
            artifacts/sidelink-mac-arm64/*arm64.dmg
            artifacts/sidelink-mac-arm64/*arm64.zip
            artifacts/sidelink-mac-arm64/latest*.yml
            artifacts/sidelink-mac-arm64/*.blockmap
            artifacts/sidelink-win/*.exe
            artifacts/sidelink-win/latest*.yml
            artifacts/sidelink-win/*.blockmap
            artifacts/sidelink-linux/*.AppImage
            artifacts/sidelink-linux/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
