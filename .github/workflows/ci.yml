# ─── CI: Lint, Type-Check, Test ──────────────────────────────────────
# Runs on every push/PR to validate code quality.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          # Skip native module builds in CI lint step
          npm_config_ignore_scripts: false

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3
        continue-on-error: true

      - name: Type-check (server)
        run: npx tsc --noEmit

      - name: Type-check (client)
        run: npx tsc --noEmit -p src/client/tsconfig.json

      - name: Run tests
        run: npm test -- --reporter=default --reporter=junit --outputFile=test-results/junit.xml
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/
          retention-days: 7

      - name: Build check
        run: npm run build

      - name: Docs build check
        run: npm run docs:build
